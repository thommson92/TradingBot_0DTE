# Nicht-geheime Konfiguration der Datenpipeline (ThetaData Python-Library).
# Geheimnisse (API-Key) gehoeren in die .env, nicht hierher.

data:
  symbol: SPXW          # SPXW = taegliche SPX-Verfaelle (0-DTE). 'SPX' hat nur
                        # monatliche/quartalsweise Verfaelle, keine taeglichen.
  right: put            # Strategie handelt Puts
  interval: "1m"        # 1-Minuten-Bars

  # Relevantes Strike-Band: behalte Puts, deren |Delta| im Tagesverlauf
  # das Band [low, high+buffer] beruehrt. Deckt Short-Strikes (~0.10-0.20)
  # UND die tiefer liegenden Long-Legs der Spreads ab.
  delta_band:
    low: 0.01
    high: 0.50
    buffer: 0.05

  start_date: "2022-01-01"   # ab Start der taeglichen SPX-Verfaelle
  end_date: null             # null => bis gestern

  # Intraday-Fenster (v3 start_time/end_time, US/Eastern) — auch fuer QC-Erwartung
  start_time: "09:30:00"
  end_time: "16:00:00"

storage:
  parquet_dir: "data/parquet"        # eine Datei je Tag
  duckdb_path: "data/market.duckdb"

# Phase 2: Backtest-Strategie (nackter Short Put).
strategy:
  target_delta: 0.16        # Ziel-|Delta| fuer die Strike-Wahl
  # delta_low/delta_high: optional, default = data.delta_band.low/high (ohne Puffer)

  # Liste der Entry-Zeiten/Tag (US/Eastern, HH:MM:SS). Mehrere Werte = mehrere
  # moegliche Trades/Tag (kein fixes "1 Trade/Tag" mehr) — begrenzt durch
  # max_trades_per_day.
  entry_times:
    - "09:35:00"
  max_trades_per_day: 1       # null = unbegrenzt
  max_concurrent_positions: 1 # kein Stacking offener Positionen

  profit_target_pct: 0.30           # Rueckkauf bei <= 30% der Eroeffnungspraemie
  stop_loss_multiplier: 2.0         # Rueckkauf bei >= 2x Eroeffnungspraemie
  time_exit_before_close_min: 5     # Zeit-Exit 5 Min vor Handelsschluss; null = bis Verfall halten

  slippage_pct_of_spread: 0.25      # 25% des Bid/Ask-Spreads, adversativ
  commission_per_contract_leg: 1.10 # USD pro Kontrakt und Leg (Open+Close je 1x)

  # Phase 3: "naked" (nackter Short Put) oder "put_spread" (zusaetzliche Long-Leg
  # zur Verlustbegrenzung). spread_width nur relevant fuer put_spread (Indexpunkte
  # Abstand der Long-Leg zur Short-Leg, z.B. 5 oder 10).
  spread_type: naked
  spread_width: null
